spring:
  application:
    name: kntc-multiagent

  datasource:
    url: ${JDBC_URL:jdbc:oracle:thin:@10.159.10.89:1521/WEBPORTAL}
    username: ${JDBC_USERNAME:TTCP_ADMIN}
    password: ${JDBC_PASSWORD:Th@nhTr@2025}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  redis:
    host: localhost
    port: 6379

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.0
          max-tokens: 2000

server:
  port: 8080

# ── Google Gemini ────────────────────────────────────
gemini:
  api-key: AIzaSyDyQnMXJK2JzVqCm95CycXWpJzpRj8iBoU # Lấy tại: https://aistudio.google.com/app/apikey
  model: gemini-3.1-flash-lite-preview # Hoặc: gemini-3.1-flash-lite-preview (thông minh hơn, chậm hơn)

# ── Agent Configuration ─────────────────────────────
agent:
  max-steps: 8 # Số bước tối đa mỗi ReAct loop
  parallel-timeout-sec: 30 # Timeout cho parallel execution
  urgency:
    deadline-hours: 24
    score-threshold: 40

logging:
  level:
    vn.vnpt.kntc: DEBUG
    org.springframework.ai: INFO
