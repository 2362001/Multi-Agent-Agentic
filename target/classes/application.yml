spring:
  application:
    name: kntc-multiagent

  datasource:
    url: ${JDBC_URL:jdbc:oracle:thin:@10.159.10.89:1521/WEBPORTAL}
    username: ${JDBC_USERNAME:TTCP_ADMIN}
    password: ${JDBC_PASSWORD:Th@nhTr@2025}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.0
          max-tokens: 2000

server:
  port: 8080

# ── Google Gemini ────────────────────────────────────
gemini:
  api-key: AIzaSyBxQkP1CqVG2huTIUQeKfTW3ivSU8B3TB0          # Lấy tại: https://aistudio.google.com/app/apikey
  model: gemini-3-flash-preview             # Hoặc: gemini-1.5-pro (thông minh hơn, chậm hơn)

# ── Agent Configuration ─────────────────────────────
agent:
  max-steps: 8               # Số bước tối đa mỗi ReAct loop
  parallel-timeout-sec: 30   # Timeout cho parallel execution
  urgency:
    deadline-hours: 24
    score-threshold: 40

logging:
  level:
    vn.vnpt.kntc: DEBUG
    org.springframework.ai: INFO
